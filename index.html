<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desktop Portfolio</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#000; --panel:#121212; --border:#333; --text:#cfcfcf; --muted:#9a9a9a; --hover:#2a2a2a; --dot-color:#3C3C3C; }
    * { box-sizing:border-box; }
    body { background:#000 url("bg.jpg") center center / cover no-repeat fixed; font-family:"Roboto Mono", monospace; color:var(--text); margin:0; height:100vh; display:flex; align-items:center; justify-content:center; }

    .desktop { position:absolute; bottom:64px; left:50%; transform:translateX(-50%); display:flex; align-items:flex-end; gap:40px; }
    .desktop-icon { display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; }
    .desktop-icon img { width:64px; height:64px; }

    .window { position:absolute; width:640px; border:1px solid var(--border); border-radius:20px; background:var(--panel); padding:20px; cursor:default; user-select:none; z-index:10; transform-origin:center center; }
    .window.opening { animation: window-open 0.16s ease-out forwards; }
    @keyframes window-open {
      from { transform: scale(0.9) translateY(12px); }
      to { transform: scale(1) translateY(0); }
    }
    .window.hidden { display:none; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:44px; color:var(--muted); cursor:grab; }
    .topbar:active { cursor:grabbing; }
    .icon-wrapper { width:24px; height:24px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .icon-wrapper img { width:24px; height:24px; object-fit:contain; }
    .items { display:grid; gap:6px; }
    a.item { display:flex; align-items:center; height:40px; padding:0 10px; border-radius:6px; color:var(--text); text-decoration:none; transition:background .18s; }
    .text-wrapper { margin-left:16px; }
    a.item:hover { background:var(--hover); color:#fff; }
    .footer { margin-top:20px; text-align:center; color:var(--muted); }

    .dot { width:12px; height:12px; border-radius:50%; background:var(--dot-color); }
    .close-dot { cursor:pointer; transition: background 0.2s; }
    .close-dot:hover { background:#fff; }

    .nav-btn { background:none; border:0; color:#4a4a4a; cursor:default; }
    #boot-screen { position:fixed; inset:0; background:#000; color:#cfcfcf; font-family:"Roboto Mono", monospace; z-index:9999; display:flex; align-items:flex-start; justify-content:flex-start; }
    #boot-screen-inner { margin:64px; display:flex; flex-direction:column; gap:8px; }
    .boot-line { opacity:0; }
    .line-1 { animation: boot-line-show 0.42s steps(1,end) forwards; }
    .line-2 { animation: boot-line-show 0.42s steps(1,end) forwards 1.12s; }
    .line-3 { animation: boot-line-show 0.42s steps(1,end) forwards 1.82s; }
    @keyframes boot-line-show { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>
  <div id="boot-screen">
    <div id="boot-screen-inner">
      <div class="boot-line line-1">Copyright (C) 1986 Denis-Skiba</div>
      <div class="boot-line line-2">All rights reserved.</div>
      <div class="boot-line line-3">Portfolio disk. Version 1.00</div>
    </div>
  </div>


  <div class="desktop">
    <div class="desktop-icon" data-window="bio-window">
      <img src="portfolio.svg" alt="bio">
      <span>bio</span>
    </div>
    <div class="desktop-icon" data-window="portfolio-window">
      <img src="portfolio.svg" alt="portfolio">
      <span>portfolio</span>
    </div>
    <div class="desktop-icon" data-window="spam-window">
      <img src="portfolio.svg" alt="spam me">
      <span>spam me</span>
    </div>
  </div>

  <div class="window hidden" id="portfolio-window">
    <div class="topbar">
      <div style="display:flex; gap:8px;">
        <button class="nav-btn" disabled><svg width="20" height="20" viewBox="0 0 10 10" fill="currentColor"><path d="M6.5 1.5L2 5l4.5 3.5V1.5z"/></svg></button>
        <button class="nav-btn" disabled><svg width="20" height="20" viewBox="0 0 10 10" fill="currentColor"><path d="M3.5 1.5L8 5 3.5 8.5V1.5z"/></svg></button>
      </div>
      <div>/Users/denisskiba/portfolio</div>
      <div style="display:flex;gap:8px;">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot close-dot" data-close="portfolio-window"></div>
      </div>
    </div>
    <div class="items">
      <a class="item" href="#"><span class="icon-wrapper"><img src="folder.svg" alt="folder"></span><span class="text-wrapper">folder1</span></a>
      <a class="item" href="#"><span class="icon-wrapper"><img src="folder.svg" alt="folder"></span><span class="text-wrapper">folder2</span></a>
      <a class="item" href="#"><span class="icon-wrapper"><img src="folder.svg" alt="folder"></span><span class="text-wrapper">folder3</span></a>
      <a class="item" href="#"><span class="icon-wrapper"><img src="file.svg" alt="file"></span><span class="text-wrapper">file1.fig</span></a>
    </div>
    <div class="footer">4 items, 67 GB available</div>
  </div>

  <div class="window hidden" id="bio-window">
    <div class="topbar">
      <div style="display:flex; gap:8px;">
        <button class="nav-btn" disabled><svg width="20" height="20" viewBox="0 0 10 10" fill="currentColor"><path d="M6.5 1.5L2 5l4.5 3.5V1.5z"/></svg></button>
        <button class="nav-btn" disabled><svg width="20" height="20" viewBox="0 0 10 10" fill="currentColor"><path d="M3.5 1.5L8 5 3.5 8.5V1.5z"/></svg></button>
      </div>
      <div>/Users/denisskiba/bio</div>
      <div style="display:flex;gap:8px;">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot close-dot" data-close="bio-window"></div>
      </div>
    </div>
    <div class="footer">bio window</div>
  </div>

  <div class="window hidden" id="spam-window">
    <div class="topbar">
      <div style="display:flex; gap:8px;">
        <button class="nav-btn" disabled><svg width="20" height="20" viewBox="0 0 10 10" fill="currentColor"><path d="M6.5 1.5L2 5l4.5 3.5V1.5z"/></svg></button>
        <button class="nav-btn" disabled><svg width="20" height="20" viewBox="0 0 10 10" fill="currentColor"><path d="M3.5 1.5L8 5 3.5 8.5V1.5z"/></svg></button>
      </div>
      <div>/Users/denisskiba/spam-me</div>
      <div style="display:flex;gap:8px;">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot close-dot" data-close="spam-window"></div>
      </div>
    </div>
    <div class="footer">spam me window</div>
  </div>

  
  <script>
  window.addEventListener('load', () => {
    const boot = document.getElementById('boot-screen');
    if (!boot) return;
    setTimeout(() => {
      boot.style.display = 'none';
    }, 3300);
  });

  const desktopIcons = document.querySelectorAll('.desktop-icon');

  desktopIcons.forEach(icon => {
    icon.addEventListener('click', () => {
      const id = icon.getAttribute('data-window');
      const win = document.getElementById(id);
      if (!win) return;

      const maxZ = Math.max(10, ...Array.from(document.querySelectorAll('.window')).map(w => parseInt(w.style.zIndex || '10')));
      win.style.zIndex = maxZ + 1;

      const alreadyVisible = !win.classList.contains('hidden');
      win.classList.remove('hidden');
      positionWindowUnderIcon(win, icon);
      makeDraggable(win);

      if (!alreadyVisible) {
        win.classList.remove('opening');
        void win.offsetWidth; // restart animation
        win.classList.add('opening');
        setTimeout(() => win.classList.remove('opening'), 200);
      }
    });
  });

  document.querySelectorAll('.close-dot').forEach(dot => {
    dot.addEventListener('click', (e) => {
      const id = dot.getAttribute('data-close');
      const win = document.getElementById(id);
      if (win) win.classList.add('hidden');
      e.stopPropagation();
    });
  });

  function positionWindowUnderIcon(win, icon) {
    const iconRect = icon.getBoundingClientRect();
    const winWidth = 640;
    const left = iconRect.left + iconRect.width / 2 - winWidth / 2;
    const top = (window.innerHeight - win.offsetHeight) / 2;
    win.style.left = left + 'px';
    win.style.top = top + 'px';
  }

  function makeDraggable(win) {
    const header = win.querySelector('.topbar');
    let offsetX, offsetY;
    header.onmousedown = (e) => {
      offsetX = e.clientX - win.offsetLeft;
      offsetY = e.clientY - win.offsetTop;
      document.onmousemove = (e2) => {
        win.style.left = (e2.clientX - offsetX) + 'px';
        win.style.top = (e2.clientY - offsetY) + 'px';
      };
      document.onmouseup = () => {
        document.onmousemove = null;
        document.onmouseup = null;
      };
    };
  }
</script>

</body>
</html>
